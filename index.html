<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Computer Repairs & Gaming PCs | TeessideTek</title>
  <meta name="description" content="Computer, phone, laptop & console repairs in Middlesbrough. Fast diagnostics and honest pricing.">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/hero.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sections.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<!-- HEADER -->
<header class="site-header">
  <a class="brand" href="#">
    <strong>TeessideTek</strong>
    <small>Teesside Repairs</small>
  </a>

  <nav class="site-nav">
    <a href="#services">Services</a>
    <a href="#console-gallery">Gallery</a>
    <a href="#process">Process</a>
    <a href="#reviews">Reviews</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- MAIN -->
<main>

<!-- HERO -->
<section class="hero">

  <div class="hero-overlay"></div>

  <div class="hero-inner">

    <!-- LEFT -->
    <div class="hero-left">

      <h1>
        Computer & Gaming PC Specialists in Teesside
      </h1>

      <p class="eyebrow">
        Computer, laptop, Mac, phone & console repairs
      </p>

      <div class="hero-actions">
        <a class="btn btn-primary" href="tel:07859897698">Call</a>
        <a class="btn btn-secondary" href="mailto:teessidetek@gmail.com">Email</a>
        <a class="btn btn-secondary" href="https://wa.me/447859897698">WhatsApp</a>
      </div>

      <div class="hero-meta">
        <span>592 Acklam Road, Middlesbrough</span>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="hero-right">

      <!-- Background Logo -->
      <img src="assets/logo_icon.png" class="hero-logo" alt="Logo">

      <!-- PC -->
      <img src="assets/hero_pc.png" class="hero-pc" alt="Gaming PC">

      <!-- Xbox Accent -->
      <img src="assets/hero_xbox.png" class="hero-xbox" alt="Xbox">

    </div>

  </div>

  <!-- STATS -->
  <div class="hero-stats">
    <div class="stat">
      <strong>2500+</strong>
      <span>Repairs</span>
    </div>
    <div class="stat">
      <strong>Same Day</strong>
      <span>Available</span>
    </div>
    <div class="stat">
      <strong>1000+ 5★</strong>
      <span>Reviews</span>
    </div>
  </div>

</section>

</main>

<!-- SCRIPT -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  const hero = document.querySelector(".hero");
  const pc = document.querySelector(".hero-pc");
  const xbox = document.querySelector(".hero-xbox");

  if (!hero || !pc) return;

  hero.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * 20;

    pc.style.transform = `translate(${x * 0.6}px, ${y * 0.6}px)`;

    if (xbox) {
      xbox.style.transform = `translate(${x}px, ${y}px) rotate(-12deg)`;
    }
  });
});
</script>

</body>
</html>
